<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Simplified geometric fish silhouette matching the AI-Me logo -->
  <g transform="translate(1, 3)">
    <!-- Tail - { brace shape -->
    <path d="M6 13 C3.5 10, 2 7.5, 2.5 4" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M6 13 C3.5 16, 2 18.5, 2.5 22" stroke="#2563eb" stroke-width="2.2" stroke-linecap="round" fill="none"/>

    <!-- Fish body - low-poly faceted shape -->
    <polygon points="6,13 12,6 18,5 26,9 28,13 26,17 18,21 12,20" fill="#2563eb"/>

    <!-- Upper head facet (lighter) -->
    <polygon points="18,5 26,9 28,13 22,11" fill="#3b82f6"/>

    <!-- Lower body facet (lighter) -->
    <polygon points="6,13 12,20 18,21 14,15" fill="#3b82f6"/>

    <!-- Dorsal fin -->
    <polygon points="14,6 17,1 19,5" fill="#2563eb"/>

    <!-- Pectoral fin -->
    <polygon points="16,16 14,22 18,21" fill="#2563eb" opacity="0.8"/>

    <!-- Ventral fin -->
    <polygon points="10,17 8,23 13,20" fill="#2563eb" opacity="0.8"/>

    <!-- Eye -->
    <circle cx="23" cy="11" r="2.2" fill="white"/>
    <circle cx="23" cy="11" r="1" fill="#1e40af"/>
  </g>
</svg>
